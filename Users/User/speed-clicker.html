<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive English Keyboard Model</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Assistant:wght@300;400;600&display=swap');

        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', 'Assistant', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            perspective: 1200px; /* מוסיף פרספקטיבה תלת-ממדית לחלל */
        }

        .keyboard-container {
            background: #1e293b;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 40px 60px -10px rgba(0, 0, 0, 0.8), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 1px solid #334155;
            border-bottom: 15px solid #070f1e; /* בסיס עבה למקלדת */
            user-select: none;
            transform: rotateX(25deg); /* הטיה של המקלדת לאחור */
            transform-style: preserve-3d;
        }

        .row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px; /* מרווח גדול יותר בגלל הגובה של המקשים */
        }

        .key {
            background: linear-gradient(145deg, #3b4d63, #2a3748);
            border-radius: 8px;
            height: 60px;
            min-width: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #475569;
            /* אפקט תלת-ממד למקש עצמו */
            box-shadow: 
                0 8px 0 #151d2b, 
                0 15px 15px rgba(0,0,0,0.5);
            transform: translateY(-8px); /* הרמת המקש כלפי מעלה */
            cursor: pointer;
            transform-style: preserve-3d;
        }

        /* הברקה קלה על חלקו העליון של המקש */
        .key::before {
            content: '';
            position: absolute;
            top: 2px; left: 2px; right: 2px; bottom: 2px;
            border-radius: 6px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.1), transparent);
            pointer-events: none;
        }

        .key span {
            font-size: 18px;
            font-weight: 700;
            color: #e2e8f0;
            text-transform: uppercase;
            transform: translateZ(1px);
        }

        /* Active State (Pressed) */
        .key.active {
            background: #38bdf8;
            /* שקיעת המקש למטה בעת לחיצה */
            transform: translateY(0px);
            box-shadow: 
                0 0px 0 #151d2b, 
                0 2px 4px rgba(0,0,0,0.4),
                0 0 25px rgba(56, 189, 248, 0.6);
            border-color: #38bdf8;
        }

        .key.active span {
            color: #0f172a;
        }

        /* Special Keys Widths */
        .key-backspace { width: 110px; }
        .key-tab { width: 90px; }
        .key-caps { width: 100px; }
        .key-enter { width: 120px; }
        .key-shift { width: 140px; }
        .key-ctrl, .key-alt, .key-meta { width: 80px; }
        .key-space { width: 400px; }

        .status-panel {
            margin-bottom: 2rem;
            text-align: center;
            transform: translateZ(50px); /* מרחיק את הטקסט למעלה מהמקלדת */
        }

        .info {
            color: #94a3b8;
            margin-top: 0.5rem;
            font-size: 1rem;
            letter-spacing: 0.025em;
        }
    </style>
</head>
<body>

    <div class="status-panel">
        <h1 class="text-3xl font-bold mb-2">Interactive English Keyboard</h1>
        <p class="info">Press keys on your physical keyboard or click the keys below</p>
    </div>

    <div class="keyboard-container" id="keyboard">
        <!-- Rows generated by JS -->
    </div>

    <script>
        // Keyboard layout structure (English)
        const layout = [
            [
                { code: 'Backquote', label: '`' },
                { code: 'Digit1', label: '1' },
                { code: 'Digit2', label: '2' },
                { code: 'Digit3', label: '3' },
                { code: 'Digit4', label: '4' },
                { code: 'Digit5', label: '5' },
                { code: 'Digit6', label: '6' },
                { code: 'Digit7', label: '7' },
                { code: 'Digit8', label: '8' },
                { code: 'Digit9', label: '9' },
                { code: 'Digit0', label: '0' },
                { code: 'Minus', label: '-' },
                { code: 'Equal', label: '=' },
                { code: 'Backspace', label: 'Back', class: 'key-backspace' }
            ],
            [
                { code: 'Tab', label: 'Tab', class: 'key-tab' },
                { code: 'KeyQ', label: 'Q' },
                { code: 'KeyW', label: 'W' },
                { code: 'KeyE', label: 'E' },
                { code: 'KeyR', label: 'R' },
                { code: 'KeyT', label: 'T' },
                { code: 'KeyY', label: 'Y' },
                { code: 'KeyU', label: 'U' },
                { code: 'KeyI', label: 'I' },
                { code: 'KeyO', label: 'O' },
                { code: 'KeyP', label: 'P' },
                { code: 'BracketLeft', label: '[' },
                { code: 'BracketRight', label: ']' },
                { code: 'Backslash', label: '\\' }
            ],
            [
                { code: 'CapsLock', label: 'Caps', class: 'key-caps' },
                { code: 'KeyA', label: 'A' },
                { code: 'KeyS', label: 'S' },
                { code: 'KeyD', label: 'D' },
                { code: 'KeyF', label: 'F' },
                { code: 'KeyG', label: 'G' },
                { code: 'KeyH', label: 'H' },
                { code: 'KeyJ', label: 'J' },
                { code: 'KeyK', label: 'K' },
                { code: 'KeyL', label: 'L' },
                { code: 'Semicolon', label: ';' },
                { code: 'Quote', label: "'" },
                { code: 'Enter', label: 'Enter', class: 'key-enter' }
            ],
            [
                { code: 'ShiftLeft', label: 'Shift', class: 'key-shift' },
                { code: 'KeyZ', label: 'Z' },
                { code: 'KeyX', label: 'X' },
                { code: 'KeyC', label: 'C' },
                { code: 'KeyV', label: 'V' },
                { code: 'KeyB', label: 'B' },
                { code: 'KeyN', label: 'N' },
                { code: 'KeyM', label: 'M' },
                { code: 'Comma', label: ',' },
                { code: 'Period', label: '.' },
                { code: 'Slash', label: '/' },
                { code: 'ShiftRight', label: 'Shift', class: 'key-shift' }
            ],
            [
                { code: 'ControlLeft', label: 'Ctrl', class: 'key-ctrl' },
                { code: 'MetaLeft', label: 'Win', class: 'key-meta' },
                { code: 'AltLeft', label: 'Alt', class: 'key-alt' },
                { code: 'Space', label: 'Space', class: 'key-space' },
                { code: 'AltRight', label: 'Alt', class: 'key-alt' },
                { code: 'ControlRight', label: 'Ctrl', class: 'key-ctrl' }
            ]
        ];

        const keyboardEl = document.getElementById('keyboard');
        const keyMap = {};

        // מילון הגייה למקשים מיוחדים וסימני פיסוק
        const pronunciationMap = {
            '`': 'backtick',
            '-': 'dash',
            '=': 'equals',
            '[': 'left bracket',
            ']': 'right bracket',
            '\\': 'backslash',
            ';': 'semicolon',
            "'": 'quote',
            ',': 'comma',
            '.': 'dot',
            '/': 'slash',
            'Back': 'backspace',
            'Caps': 'caps lock',
            'Win': 'windows key'
        };

        // פונקציית הקראה
        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // עצירת ההקראה הקודמת כדי לא ליצור תור ארוך
                const spokenText = pronunciationMap[text] || text;
                const msg = new SpeechSynthesisUtterance(spokenText);
                msg.lang = 'en-US';
                msg.rate = 1.5; // מהירות הקראה מהירה יותר
                window.speechSynthesis.speak(msg);
            }
        }

        // Create UI
        layout.forEach(row => {
            const rowEl = document.createElement('div');
            rowEl.className = 'row';
            row.forEach(key => {
                const keyEl = document.createElement('div');
                keyEl.className = `key ${key.class || ''}`;
                keyEl.id = `key-${key.code}`;
                keyEl.dataset.label = key.label; // שמירת התווית עבור פונקציית ההקראה
                
                const labelSpan = document.createElement('span');
                labelSpan.textContent = key.label;
                
                keyEl.appendChild(labelSpan);
                rowEl.appendChild(keyEl);
                
                keyMap[key.code] = keyEl;
            });
            keyboardEl.appendChild(rowEl);
        });

        // Listen for physical keyboard events
        window.addEventListener('keydown', (e) => {
            if (['Tab', 'AltLeft', 'AltRight', 'MetaLeft', 'ContextMenu'].includes(e.code)) {
                e.preventDefault();
            }

            const keyEl = keyMap[e.code];
            if (keyEl) {
                // בדיקה שזו לא לחיצה ארוכה מתמשכת כדי לא להספים את ההקראה
                if (!e.repeat) {
                    speakText(keyEl.dataset.label);
                }
                keyEl.classList.add('active');
            }
        });

        window.addEventListener('keyup', (e) => {
            const keyEl = keyMap[e.code];
            if (keyEl) {
                keyEl.classList.remove('active');
            }
        });

        // Mouse click interaction
        keyboardEl.addEventListener('mousedown', (e) => {
            const keyEl = e.target.closest('.key');
            if (keyEl) {
                speakText(keyEl.dataset.label);
                keyEl.classList.add('active');
            }
        });

        window.addEventListener('mouseup', () => {
            document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
        });

    </script>
</body>
</html>
