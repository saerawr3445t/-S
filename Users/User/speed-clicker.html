<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Speed Clicker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; cursor: pointer; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W = window.innerWidth;
let H = window.innerHeight;
canvas.width = W;
canvas.height = H;

window.addEventListener('resize', () => {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
});

// ── Constants ──────────────────────────────────────────────────────────────
const GAME_DURATION = 5;

// Dynamic layout helpers
function btnCX() { return W / 2; }
function btnCY() { return H / 2 + H * 0.08; }
function btnR()  { return Math.min(W, H) * 0.16; }

// ── State ──────────────────────────────────────────────────────────────────
let state = 'menu';
let score = 0;
let timeLeft = GAME_DURATION;
let startTime = 0;
let particles = [];
let ripples = [];
let floaters = [];
let btnScale = 1;
let btnScaleTarget = 1;
let shakeX = 0, shakeY = 0;
let bgHue = 240;

// ── Particles ──────────────────────────────────────────────────────────────
function spawnParticles(x, y) {
  const count = 12 + Math.floor(Math.random() * 10);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 7;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.025 + Math.random() * 0.035,
      r: 4 + Math.random() * 7,
      hue: 180 + Math.random() * 80
    });
  }
}

function spawnRipple(x, y) {
  const r = btnR();
  ripples.push({ x, y, r: r * 0.18, maxR: r * 0.9 + Math.random() * r * 0.5, life: 1 });
}

function spawnFloater(x, y) {
  const s = Math.min(W, H);
  floaters.push({
    x: x + (Math.random() - 0.5) * 80,
    y,
    vy: -2 - Math.random() * 1.5,
    life: 1,
    decay: 0.022,
    size: Math.floor(s * 0.04)
  });
}

// ── Input ──────────────────────────────────────────────────────────────────
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top)  * (H / rect.height);

  if (state === 'menu') {
    const dx = mx - btnCX(), dy = my - btnCY(), r = btnR();
    if (dx * dx + dy * dy < r * r) startGame();
    return;
  }

  if (state === 'gameover') {
    const bx = W / 2, by = H * 0.72;
    const bw = Math.min(W * 0.4, 220), bh = 54;
    if (Math.abs(mx - bx) < bw / 2 && Math.abs(my - by) < bh / 2) restartGame();
    return;
  }

  if (state === 'playing') {
    const dx = mx - btnCX(), dy = my - btnCY(), r = btnR();
    if (dx * dx + dy * dy < r * r) {
      score++;
      btnScaleTarget = 0.86;
      spawnParticles(mx, my);
      spawnRipple(mx, my);
      spawnFloater(mx, my);
      shakeX = (Math.random() - 0.5) * 8;
      shakeY = (Math.random() - 0.5) * 8;
      bgHue = (bgHue + 8) % 360;
    }
  }
});

// ── Game Control ───────────────────────────────────────────────────────────
function startGame() {
  score = 0;
  timeLeft = GAME_DURATION;
  startTime = performance.now();
  particles = []; ripples = []; floaters = [];
  btnScale = 1; btnScaleTarget = 1;
  bgHue = 240;
  state = 'playing';
}

function restartGame() {
  state = 'menu';
  particles = []; ripples = []; floaters = [];
}

// ── Update ─────────────────────────────────────────────────────────────────
function update() {
  btnScale += (btnScaleTarget - btnScale) * 0.25;
  btnScaleTarget += (1 - btnScaleTarget) * 0.2;
  shakeX *= 0.7;
  shakeY *= 0.7;

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.18;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i];
    r.r += (r.maxR - r.r) * 0.12;
    r.life -= 0.04;
    if (r.life <= 0) ripples.splice(i, 1);
  }
  for (let i = floaters.length - 1; i >= 0; i--) {
    const f = floaters[i];
    f.y += f.vy; f.life -= f.decay;
    if (f.life <= 0) floaters.splice(i, 1);
  }

  if (state === 'playing') {
    timeLeft = Math.max(0, GAME_DURATION - (performance.now() - startTime) / 1000);
    if (timeLeft === 0) state = 'gameover';
  }
}

// ── Draw Helpers ───────────────────────────────────────────────────────────
function drawRoundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawBackground() {
  const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.75);
  grad.addColorStop(0, `hsl(${bgHue},40%,12%)`);
  grad.addColorStop(1, `hsl(${bgHue},30%,4%)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawParticlesAndRipples() {
  for (const r of ripples) {
    ctx.save();
    ctx.globalAlpha = r.life * 0.5;
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
    ctx.strokeStyle = `hsl(${bgHue + 60}, 100%, 70%)`;
    ctx.lineWidth = 2.5;
    ctx.stroke();
    ctx.restore();
  }
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle = `hsl(${p.hue}, 100%, 65%)`;
    ctx.shadowBlur = 12;
    ctx.shadowColor = `hsl(${p.hue}, 100%, 65%)`;
    ctx.fill();
    ctx.restore();
  }
  for (const f of floaters) {
    ctx.save();
    ctx.globalAlpha = f.life;
    ctx.font = `bold ${f.size}px sans-serif`;
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#0ff';
    ctx.textAlign = 'center';
    ctx.fillText('+1', f.x, f.y);
    ctx.restore();
  }
}

function drawTimerBar() {
  const pad = W * 0.06;
  const barW = W - pad * 2, barH = Math.max(14, H * 0.025);
  const bx = pad, by = H * 0.04;
  const ratio = timeLeft / GAME_DURATION;

  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  drawRoundRect(bx, by, barW, barH, barH / 2);
  ctx.fill();

  const hue = ratio > 0.4 ? 140 : ratio > 0.2 ? 40 : 0;
  const grad = ctx.createLinearGradient(bx, 0, bx + barW * ratio, 0);
  grad.addColorStop(0, `hsl(${hue}, 100%, 55%)`);
  grad.addColorStop(1, `hsl(${hue + 40}, 100%, 70%)`);
  ctx.save();
  ctx.shadowBlur = 18;
  ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;
  ctx.fillStyle = grad;
  drawRoundRect(bx, by, Math.max(barH, barW * ratio), barH, barH / 2);
  ctx.fill();
  ctx.restore();

  const fs = Math.max(12, H * 0.022);
  ctx.font = `bold ${fs}px sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.textAlign = 'center';
  ctx.fillText(`${timeLeft.toFixed(1)}s`, W / 2, by + barH * 0.75);
}

function drawMainButton(label, sublabel) {
  const cx = btnCX(), cy = btnCY(), r = btnR();
  ctx.save();
  ctx.translate(cx + shakeX, cy + shakeY);
  ctx.scale(btnScale, btnScale);

  // Outer ring
  ctx.beginPath();
  ctx.arc(0, 0, r + r * 0.1, 0, Math.PI * 2);
  ctx.strokeStyle = `hsla(${bgHue + 120}, 100%, 65%, 0.3)`;
  ctx.lineWidth = 4;
  ctx.stroke();

  // Glow + body
  ctx.shadowBlur = 60;
  ctx.shadowColor = `hsl(${bgHue + 120}, 100%, 55%)`;

  const grad = ctx.createRadialGradient(-r * 0.18, -r * 0.27, r * 0.08, 0, 0, r);
  grad.addColorStop(0, `hsl(${bgHue + 120}, 90%, 55%)`);
  grad.addColorStop(0.6, `hsl(${bgHue + 100}, 85%, 38%)`);
  grad.addColorStop(1,   `hsl(${bgHue + 80},  80%, 22%)`);

  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Highlight
  ctx.beginPath();
  ctx.arc(-r * 0.13, -r * 0.27, r * 0.55, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.fill();

  // Text
  ctx.shadowBlur = 0;
  const mainFs = Math.max(18, r * 0.23);
  const subFs  = Math.max(12, r * 0.13);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${mainFs}px sans-serif`;
  ctx.fillText(label, 0, sublabel ? -subFs * 0.8 : 0);
  if (sublabel) {
    ctx.font = `${subFs}px sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText(sublabel, 0, mainFs * 0.7);
  }

  ctx.restore();
}

// ── Scenes ─────────────────────────────────────────────────────────────────
function drawMenu() {
  drawBackground();
  drawParticlesAndRipples();

  const titleFs = Math.min(W * 0.1, H * 0.09, 80);
  const subFs   = Math.min(W * 0.04, H * 0.035, 26);

  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = `bold ${titleFs}px sans-serif`;
  ctx.fillStyle = '#fff';
  ctx.shadowBlur = 35;
  ctx.shadowColor = `hsl(${bgHue + 120}, 100%, 60%)`;
  ctx.fillText('SPEED CLICKER', W / 2, H * 0.18);
  ctx.restore();

  ctx.font = `${subFs}px sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.textAlign = 'center';
  ctx.fillText('Click as fast as you can in 5 seconds!', W / 2, H * 0.27);

  drawMainButton('CLICK TO START', 'tap the button to begin');

  const footerFs = Math.max(11, H * 0.018);
  ctx.font = `${footerFs}px sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.28)';
  ctx.textAlign = 'center';
  ctx.fillText('Mouse click only', W / 2, H - H * 0.03);
}

function drawPlaying() {
  drawBackground();
  drawParticlesAndRipples();
  drawTimerBar();

  const scoreFs = Math.min(W * 0.18, H * 0.15, 140);
  const labelFs = Math.max(13, H * 0.025);

  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = `bold ${scoreFs}px sans-serif`;
  ctx.fillStyle = '#fff';
  ctx.shadowBlur = 25;
  ctx.shadowColor = `hsl(${bgHue + 120}, 100%, 60%)`;
  ctx.fillText(score, W / 2, H * 0.3);
  ctx.shadowBlur = 0;
  ctx.font = `${labelFs}px sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fillText('clicks', W / 2, H * 0.3 + labelFs * 1.4);
  ctx.restore();

  drawMainButton('CLICK!');
}

function drawGameOver() {
  drawBackground();
  drawParticlesAndRipples();

  const cps = (score / GAME_DURATION).toFixed(1);

  const titleFs = Math.min(W * 0.09, H * 0.08, 72);
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = `bold ${titleFs}px sans-serif`;
  ctx.fillStyle = '#fff';
  ctx.shadowBlur = 35;
  ctx.shadowColor = `hsl(${bgHue + 120}, 100%, 60%)`;
  ctx.fillText("TIME'S UP!", W / 2, H * 0.18);
  ctx.restore();

  // Score card
  const cardW = Math.min(W * 0.55, 400);
  const cardH = Math.min(H * 0.3, 200);
  const cardX = W / 2 - cardW / 2;
  const cardY = H * 0.23;

  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.strokeStyle = 'rgba(255,255,255,0.13)';
  ctx.lineWidth = 1.5;
  drawRoundRect(cardX, cardY, cardW, cardH, 20);
  ctx.fill();
  ctx.stroke();

  ctx.textAlign = 'center';

  const bigFs = Math.min(cardH * 0.55, 100);
  ctx.font = `bold ${bigFs}px sans-serif`;
  ctx.fillStyle = '#fff';
  ctx.shadowBlur = 22;
  ctx.shadowColor = `hsl(${bgHue + 120}, 100%, 60%)`;
  ctx.fillText(score, W / 2, cardY + cardH * 0.58);

  ctx.shadowBlur = 0;
  const smallFs = Math.max(12, cardH * 0.1);
  ctx.font = `${smallFs}px sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText('total clicks', W / 2, cardY + cardH * 0.73);

  const cpsFs = Math.max(14, cardH * 0.13);
  ctx.font = `bold ${cpsFs}px sans-serif`;
  ctx.fillStyle = `hsl(${bgHue + 120}, 90%, 65%)`;
  ctx.fillText(`${cps} clicks/sec`, W / 2, cardY + cardH * 0.92);
  ctx.restore();

  // Rating
  const rating = score >= 60 ? '🔥 LEGENDARY' : score >= 45 ? '⚡ AMAZING' : score >= 30 ? '👍 GREAT' : score >= 15 ? '😊 GOOD' : '🐢 KEEP TRYING';
  const ratingFs = Math.max(14, H * 0.028);
  ctx.font = `bold ${ratingFs}px sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.textAlign = 'center';
  ctx.fillText(rating, W / 2, H * 0.63);

  // Play Again button
  const bx = W / 2, by = H * 0.72;
  const bw = Math.min(W * 0.4, 220), bh = Math.max(44, H * 0.065);
  ctx.save();
  ctx.shadowBlur = 22;
  ctx.shadowColor = `hsl(${bgHue + 120}, 100%, 55%)`;
  const grad = ctx.createLinearGradient(bx - bw / 2, by, bx + bw / 2, by);
  grad.addColorStop(0, `hsl(${bgHue + 120}, 85%, 45%)`);
  grad.addColorStop(1, `hsl(${bgHue + 160}, 85%, 45%)`);
  ctx.fillStyle = grad;
  drawRoundRect(bx - bw / 2, by - bh / 2, bw, bh, bh / 2);
  ctx.fill();
  ctx.restore();

  const btnFs = Math.max(14, bh * 0.38);
  ctx.font = `bold ${btnFs}px sans-serif`;
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText('PLAY AGAIN', bx, by + btnFs * 0.35);
}

// ── Loop ───────────────────────────────────────────────────────────────────
function loop() {
  update();
  ctx.clearRect(0, 0, W, H);
  if (state === 'menu')     drawMenu();
  else if (state === 'playing')  drawPlaying();
  else if (state === 'gameover') drawGameOver();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
