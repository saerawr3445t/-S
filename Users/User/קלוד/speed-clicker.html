<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Speed Clicker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
  canvas { display: block; position: absolute; top: 0; left: 0; cursor: pointer; }

  #name-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 5vh; pointer-events: none;
  }
  #name-box {
    pointer-events: all;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 18px;
    padding: 24px 36px;
    backdrop-filter: blur(8px);
  }
  #name-box label { color: rgba(255,255,255,0.75); font-size: clamp(13px,2vw,18px); }
  #name-input {
    background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.25);
    border-radius: 10px; color: #fff; font-size: clamp(15px,2.2vw,20px);
    padding: 9px 18px; text-align: center; outline: none;
    width: clamp(180px,28vw,280px); transition: border-color 0.2s;
  }
  #name-input:focus { border-color: rgba(100,200,255,0.8); }
  #start-btn {
    background: linear-gradient(135deg,#2af,#a2f); border: none; border-radius: 12px;
    color: #fff; font-size: clamp(14px,1.8vw,18px); font-weight: bold;
    padding: 11px 34px; cursor: pointer; letter-spacing: 0.06em;
    box-shadow: 0 0 20px rgba(100,180,255,0.4); transition: transform 0.1s;
  }
  #start-btn:hover { transform: scale(1.05); }
  #start-btn:active { transform: scale(0.96); }
  #name-box.hidden { display: none; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="name-overlay">
  <div id="name-box">
    <label>Enter your name to play</label>
    <input id="name-input" type="text" maxlength="16" placeholder="Your name..." autocomplete="off" spellcheck="false"/>
    <button id="start-btn">START GAME</button>
  </div>
</div>

<script>
// ── API (crudcrud.com — free, no setup) ────────────────────────────────────
const API = 'https://crudcrud.com/api/e360cff7a164490cb43653bd9fb24ef6/scores';

async function loadScores() {
  try {
    const r = await fetch(API);
    const data = await r.json();
    leaderboard = data.sort((a,b) => b.score - a.score).slice(0,9);
  } catch(e) { console.warn('Load failed', e); }
}

async function saveScore(name, score) {
  try {
    await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, score})
    });
    await loadScores();
  } catch(e) { console.warn('Save failed', e); }
}

// ── Canvas ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = window.innerWidth, H = window.innerHeight;
canvas.width = W; canvas.height = H;
window.addEventListener('resize', () => {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
});

// ── Constants ───────────────────────────────────────────────────────────────
const GAME_DURATION = 5;
const btnCX = () => W / 2;
const btnCY = () => H * 0.58;
const btnR  = () => Math.min(W, H) * 0.13;

// ── State ───────────────────────────────────────────────────────────────────
let state = 'menu';
let playerName = '';
let score = 0;
let timeLeft = GAME_DURATION;
let startTime = 0;
let particles = [], ripples = [], floaters = [];
let btnScale = 1, btnScaleTarget = 1;
let shakeX = 0, shakeY = 0;
let bgHue = 240;
let leaderboard = [];
let saving = false;

loadScores();

// ── Name form ───────────────────────────────────────────────────────────────
const nameBox   = document.getElementById('name-box');
const nameInput = document.getElementById('name-input');
const startBtn  = document.getElementById('start-btn');

const showForm = () => { nameBox.classList.remove('hidden'); nameInput.focus(); };
const hideForm = () => nameBox.classList.add('hidden');

startBtn.addEventListener('click', tryStart);
nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryStart(); });

function tryStart() {
  const n = nameInput.value.trim();
  if (!n) { nameInput.style.borderColor='rgba(255,80,80,0.8)'; nameInput.focus(); return; }
  nameInput.style.borderColor = '';
  playerName = n;
  hideForm();
  startGame();
}

// ── Particles ───────────────────────────────────────────────────────────────
function spawnParticles(x, y) {
  for (let i = 0; i < 14; i++) {
    const a = Math.random()*Math.PI*2, sp = 3+Math.random()*7;
    particles.push({ x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      life:1, decay:0.025+Math.random()*0.035, r:4+Math.random()*7, hue:180+Math.random()*80 });
  }
}
function spawnRipple(x, y) {
  const r = btnR();
  ripples.push({ x, y, r:r*0.18, maxR:r*0.9+Math.random()*r*0.5, life:1 });
}
function spawnFloater(x, y) {
  floaters.push({ x:x+(Math.random()-0.5)*80, y, vy:-2-Math.random()*1.5,
    life:1, decay:0.022, size:Math.floor(Math.min(W,H)*0.04) });
}

// ── Input ───────────────────────────────────────────────────────────────────
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX-rect.left)*(W/rect.width);
  const my = (e.clientY-rect.top)*(H/rect.height);

  if (state === 'gameover') {
    const bx=W/2, by=H*0.88, bw=Math.min(W*0.4,220), bh=Math.max(44,H*0.065);
    if (Math.abs(mx-bx)<bw/2 && Math.abs(my-by)<bh/2) backToMenu();
    return;
  }
  if (state === 'playing') {
    const dx=mx-btnCX(), dy=my-btnCY(), r=btnR();
    if (dx*dx+dy*dy < r*r) {
      score++; btnScaleTarget=0.86;
      spawnParticles(mx,my); spawnRipple(mx,my); spawnFloater(mx,my);
      shakeX=(Math.random()-0.5)*8; shakeY=(Math.random()-0.5)*8;
      bgHue=(bgHue+8)%360;
    }
  }
});

// ── Game control ─────────────────────────────────────────────────────────────
function startGame() {
  score=0; timeLeft=GAME_DURATION; startTime=performance.now();
  particles=[]; ripples=[]; floaters=[];
  btnScale=1; btnScaleTarget=1; bgHue=240; saving=false;
  state='playing';
}

function backToMenu() {
  state='menu'; particles=[]; ripples=[]; floaters=[];
  loadScores();
  showForm();
}

// ── Update ───────────────────────────────────────────────────────────────────
function update() {
  btnScale += (btnScaleTarget-btnScale)*0.25;
  btnScaleTarget += (1-btnScaleTarget)*0.2;
  shakeX*=0.7; shakeY*=0.7;
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life-=p.decay;
    if(p.life<=0) particles.splice(i,1);
  }
  for (let i=ripples.length-1;i>=0;i--) {
    const r=ripples[i]; r.r+=(r.maxR-r.r)*0.12; r.life-=0.04;
    if(r.life<=0) ripples.splice(i,1);
  }
  for (let i=floaters.length-1;i>=0;i--) {
    const f=floaters[i]; f.y+=f.vy; f.life-=f.decay;
    if(f.life<=0) floaters.splice(i,1);
  }
  if (state==='playing') {
    timeLeft=Math.max(0,GAME_DURATION-(performance.now()-startTime)/1000);
    if (timeLeft===0 && !saving) { saving=true; state='gameover'; saveScore(playerName,score); }
  }
}

// ── Draw helpers ──────────────────────────────────────────────────────────────
function rrect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function drawBG() {
  const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.75);
  g.addColorStop(0,`hsl(${bgHue},40%,12%)`); g.addColorStop(1,`hsl(${bgHue},30%,4%)`);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}

function drawFX() {
  for (const r of ripples) {
    ctx.save(); ctx.globalAlpha=r.life*0.5;
    ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,Math.PI*2);
    ctx.strokeStyle=`hsl(${bgHue+60},100%,70%)`; ctx.lineWidth=2.5; ctx.stroke(); ctx.restore();
  }
  for (const p of particles) {
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ctx.fillStyle=`hsl(${p.hue},100%,65%)`;
    ctx.shadowBlur=12; ctx.shadowColor=`hsl(${p.hue},100%,65%)`; ctx.fill(); ctx.restore();
  }
  for (const f of floaters) {
    ctx.save(); ctx.globalAlpha=f.life;
    ctx.font=`bold ${f.size}px sans-serif`; ctx.fillStyle='#fff';
    ctx.shadowBlur=10; ctx.shadowColor='#0ff';
    ctx.textAlign='center'; ctx.fillText('+1',f.x,f.y); ctx.restore();
  }
}

function drawTimerBar() {
  const pad=W*0.06, barW=W-pad*2, barH=Math.max(14,H*0.025), bx=pad, by=H*0.04;
  const ratio=timeLeft/GAME_DURATION;
  ctx.fillStyle='rgba(255,255,255,0.08)'; rrect(bx,by,barW,barH,barH/2); ctx.fill();
  const hue=ratio>0.4?140:ratio>0.2?40:0;
  const g=ctx.createLinearGradient(bx,0,bx+barW*ratio,0);
  g.addColorStop(0,`hsl(${hue},100%,55%)`); g.addColorStop(1,`hsl(${hue+40},100%,70%)`);
  ctx.save(); ctx.shadowBlur=18; ctx.shadowColor=`hsl(${hue},100%,60%)`; ctx.fillStyle=g;
  rrect(bx,by,Math.max(barH,barW*ratio),barH,barH/2); ctx.fill(); ctx.restore();
  const fs=Math.max(12,H*0.022);
  ctx.font=`bold ${fs}px sans-serif`; ctx.fillStyle='rgba(255,255,255,0.75)';
  ctx.textAlign='center'; ctx.fillText(`${timeLeft.toFixed(1)}s`,W/2,by+barH*0.75);
}

function drawClickBtn(label) {
  const cx=btnCX(), cy=btnCY(), r=btnR();
  ctx.save(); ctx.translate(cx+shakeX,cy+shakeY); ctx.scale(btnScale,btnScale);
  ctx.beginPath(); ctx.arc(0,0,r+r*0.1,0,Math.PI*2);
  ctx.strokeStyle=`hsla(${bgHue+120},100%,65%,0.3)`; ctx.lineWidth=4; ctx.stroke();
  ctx.shadowBlur=60; ctx.shadowColor=`hsl(${bgHue+120},100%,55%)`;
  const g=ctx.createRadialGradient(-r*0.18,-r*0.27,r*0.08,0,0,r);
  g.addColorStop(0,`hsl(${bgHue+120},90%,55%)`);
  g.addColorStop(0.6,`hsl(${bgHue+100},85%,38%)`);
  g.addColorStop(1,`hsl(${bgHue+80},80%,22%)`);
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  ctx.beginPath(); ctx.arc(-r*0.13,-r*0.27,r*0.55,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.07)'; ctx.fill();
  ctx.shadowBlur=0;
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle='#fff';
  ctx.font=`bold ${Math.max(18,r*0.25)}px sans-serif`;
  ctx.fillText(label,0,0); ctx.restore();
}

// ── Leaderboard ───────────────────────────────────────────────────────────────
function drawLeaderboard(cx, topY, tableW) {
  const rows = 9;
  const rowH = Math.max(26, H * 0.044);
  const tW = Math.min(tableW, 460);
  const tH = rowH * (rows + 1) + 10;
  const tX = cx - tW / 2;
  const medals = ['🥇','🥈','🥉'];

  // Panel
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
  rrect(tX, topY, tW, tH, 14); ctx.fill(); ctx.stroke();

  // Header
  const hFs = Math.max(11, rowH*0.36);
  ctx.font = `bold ${hFs}px sans-serif`;
  ctx.fillStyle = `hsl(${bgHue+120},75%,62%)`;
  ctx.textAlign = 'left';
  ctx.fillText('#',    tX + tW*0.05, topY + rowH*0.74);
  ctx.fillText('NAME', tX + tW*0.18, topY + rowH*0.74);
  ctx.textAlign = 'right';
  ctx.fillText('CLICKS', tX + tW*0.97, topY + rowH*0.74);

  // Divider
  ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(tX+8, topY+rowH+3); ctx.lineTo(tX+tW-8, topY+rowH+3); ctx.stroke();

  const rFs = Math.max(12, rowH*0.4);

  if (leaderboard.length === 0) {
    ctx.font = `${rFs}px sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.textAlign = 'center';
    ctx.fillText('No scores yet — be the first!', cx, topY + tH/2 + rFs/3);
    ctx.restore(); return;
  }

  for (let i = 0; i < Math.min(leaderboard.length, rows); i++) {
    const e = leaderboard[i];
    const ry = topY + rowH*(i+1) + rowH*0.72 + 4;
    const isMe = (state==='gameover' && e.name===playerName && e.score===score);

    if (isMe) {
      ctx.save(); ctx.fillStyle=`hsla(${bgHue+120},80%,55%,0.18)`;
      rrect(tX+4, topY+rowH*(i+1)+4, tW-8, rowH-2, 8); ctx.fill(); ctx.restore();
    }

    const alpha = Math.max(0.45, 1 - i*0.06);
    ctx.fillStyle = isMe ? `hsl(${bgHue+120},95%,72%)` : `rgba(255,255,255,${alpha})`;
    ctx.font = `${i<3?'bold ':''}${rFs}px sans-serif`;

    // Rank
    ctx.textAlign='center';
    ctx.fillText(i<3 ? medals[i] : `${i+1}`, tX+tW*0.085, ry);

    // Name (truncate)
    ctx.textAlign='left';
    let name = e.name;
    const maxNW = tW*0.56;
    while (ctx.measureText(name).width > maxNW && name.length > 1) name = name.slice(0,-1)+'…';
    ctx.fillText(name, tX+tW*0.18, ry);

    // Score
    ctx.textAlign='right';
    ctx.fillText(e.score, tX+tW*0.97, ry);
  }
  ctx.restore();
}

// ── Scenes ────────────────────────────────────────────────────────────────────
function drawMenu() {
  drawBG(); drawFX();

  const titleFs = Math.min(W*0.075, H*0.065, 60);
  ctx.save(); ctx.textAlign='center';
  ctx.font=`bold ${titleFs}px sans-serif`; ctx.fillStyle='#fff';
  ctx.shadowBlur=28; ctx.shadowColor=`hsl(${bgHue+120},100%,60%)`;
  ctx.fillText('SPEED CLICKER', W/2, H*0.09);
  ctx.restore();

  drawLeaderboard(W/2, H*0.12, W*0.72);

  ctx.font=`${Math.max(11,H*0.018)}px sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.textAlign='center';
  ctx.fillText('Mouse click only · 5 seconds', W/2, H*0.975);
}

function drawPlaying() {
  drawBG(); drawFX(); drawTimerBar();
  const sFs=Math.min(W*0.16,H*0.14,130), lFs=Math.max(13,H*0.025);
  ctx.save(); ctx.textAlign='center';
  ctx.font=`bold ${sFs}px sans-serif`; ctx.fillStyle='#fff';
  ctx.shadowBlur=25; ctx.shadowColor=`hsl(${bgHue+120},100%,60%)`;
  ctx.fillText(score, W/2, H*0.28);
  ctx.shadowBlur=0; ctx.font=`${lFs}px sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.45)';
  ctx.fillText('clicks', W/2, H*0.28+lFs*1.4);
  ctx.restore();
  drawClickBtn('CLICK!');
}

function drawGameOver() {
  drawBG(); drawFX();
  const cps=(score/GAME_DURATION).toFixed(1);

  const titleFs=Math.min(W*0.075,H*0.065,58);
  ctx.save(); ctx.textAlign='center';
  ctx.font=`bold ${titleFs}px sans-serif`; ctx.fillStyle='#fff';
  ctx.shadowBlur=28; ctx.shadowColor=`hsl(${bgHue+120},100%,60%)`;
  ctx.fillText("TIME'S UP!", W/2, H*0.09);
  ctx.restore();

  // Score badge
  const bH=H*0.11, bW=Math.min(W*0.5,320), bX=W/2-bW/2, bY=H*0.12;
  ctx.save();
  ctx.fillStyle='rgba(255,255,255,0.07)'; ctx.strokeStyle='rgba(255,255,255,0.14)'; ctx.lineWidth=1.5;
  rrect(bX,bY,bW,bH,14); ctx.fill(); ctx.stroke();
  const bigFs=Math.min(bH*0.55,80);
  ctx.font=`bold ${bigFs}px sans-serif`; ctx.fillStyle='#fff'; ctx.textAlign='center';
  ctx.shadowBlur=18; ctx.shadowColor=`hsl(${bgHue+120},100%,60%)`;
  ctx.fillText(score, W/2, bY+bH*0.62);
  ctx.shadowBlur=0;
  ctx.font=`${Math.max(11,bH*0.18)}px sans-serif`; ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.fillText(`${cps} clicks/sec  ·  ${playerName}`, W/2, bY+bH*0.88);
  ctx.restore();

  drawLeaderboard(W/2, H*0.25, W*0.68);

  // Play Again button
  const px=W/2, py=H*0.88, pw=Math.min(W*0.38,210), ph=Math.max(42,H*0.06);
  ctx.save(); ctx.shadowBlur=22; ctx.shadowColor=`hsl(${bgHue+120},100%,55%)`;
  const g=ctx.createLinearGradient(px-pw/2,py,px+pw/2,py);
  g.addColorStop(0,`hsl(${bgHue+120},85%,45%)`); g.addColorStop(1,`hsl(${bgHue+160},85%,45%)`);
  ctx.fillStyle=g; rrect(px-pw/2,py-ph/2,pw,ph,ph/2); ctx.fill(); ctx.restore();
  ctx.font=`bold ${Math.max(14,ph*0.38)}px sans-serif`; ctx.fillStyle='#fff';
  ctx.textAlign='center'; ctx.fillText('PLAY AGAIN', px, py+Math.max(14,ph*0.38)*0.35);
}

// ── Loop ──────────────────────────────────────────────────────────────────────
function loop() {
  update();
  ctx.clearRect(0,0,W,H);
  if      (state==='menu')     drawMenu();
  else if (state==='playing')  drawPlaying();
  else if (state==='gameover') drawGameOver();
  requestAnimationFrame(loop);
}

showForm();
requestAnimationFrame(loop);
</script>
</body>
</html>
